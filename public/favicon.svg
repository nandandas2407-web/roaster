<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A4D"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>

    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".12"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="228"
          fill="#F6F1E8"
          stroke="#ECE2D4"
          stroke-width="10"
          filter="url(#shadow)"/>

  <!-- Inner Ring -->
  <circle cx="256" cy="256" r="194"
          fill="none"
          stroke="#DDD2C4"
          stroke-width="2"
          stroke-dasharray="6 8"/>

  <!-- Center -->
  <circle cx="256" cy="256" r="110"
          fill="#FCF8F2"
          stroke="#E9DFD1"
          stroke-width="6"/>

  <!-- R -->
  <text x="256"
        y="288"
        text-anchor="middle"
        font-family="Inter,Arial,sans-serif"
        font-size="128"
        font-weight="900"
        fill="#1B1B1B">
    R
  </text>

  <!-- Roast Accent -->
  <path d="M330 160
           C352 138 381 150 381 177
           C381 201 360 214 340 226
           C352 205 346 188 330 160Z"
        fill="url(#g)"/>

  <!-- Circular Text -->
  <defs>
    <path id="topArc"
          d="M86 256
             A170 170 0 0 1 426 256"/>

    <path id="bottomArc"
          d="M426 256
             A170 170 0 0 1 86 256"/>
  </defs>

  <text font-family="JetBrains Mono, monospace"
        font-size="18"
        letter-spacing="5"
        fill="#555">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      ROASTER0
    </textPath>
  </text>

  <text font-family="JetBrains Mono, monospace"
        font-size="15"
        letter-spacing="4"
        fill="#888">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      BUREAU OF UNSOLICITED OPINIONS
    </textPath>
  </text>
</svg>
